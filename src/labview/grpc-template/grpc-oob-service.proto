syntax = "proto3";

package hwval;

import "google/protobuf/any.proto";

service ExamplePluginOOBService {
	// Add plugin-specific service methods here.
	// Here are some example service methods using example request and response messages:
	rpc Execute (GenericRequest) returns (StatusResponse) {} // This is an example of a generic method, which includes the command name and the payload in its request.
	rpc Pause (BoolRequest) returns (StatusResponse) {}
	rpc Resume (BoolRequest) returns (StatusResponse) {}
	rpc Export (ExportRequest) returns (StatusResponse) {}
}

// ---Request Messages---

// Add plugin-specific request messages here.

// Here are some example request messagess:

message GenericRequest {
	string Command = 1;
	google.protobuf.Any Payload = 2;
}

message BoolRequest {
	bool BooleanData = 1;
}

message ExportRequest {
	string FileType = 1;
}

// ---Response Messages---

// Status message is intended to be used to return status/error codes
message StatusResponse {
	bool Status = 1;
	int32 Code = 2;
	string Message = 3;
}