syntax = "proto3";

package hwval;

// TODO: Replace example RPCs (service methods) and messages with real plugin operations
service ExamplePluginOOBService {
	rpc PauseResume (BoolRequest) returns (StatusResponse) {}
	rpc Export (ExportRequest) returns (StatusResponse) {}
}

message BoolRequest {
	bool BooleanData = 1;
}

message ExportRequest {
	string FileType = 1;
}

// Returned status or error details.
message StatusResponse {
	bool Status = 1;
	int32 Code = 2;
	string Message = 3;
}